<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediCore HMS – Login</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .auth-tabs { display: flex; gap: 4px; background: var(--bg-input); border: 1px solid var(--border); border-radius: 12px; padding: 4px; margin-bottom: 24px; }
    .auth-tab { flex: 1; padding: 9px; text-align: center; border-radius: 9px; cursor: pointer; font-size: 14px; font-weight: 600; transition: all 0.2s; border: none; background: transparent; color: var(--text-muted); font-family: 'Outfit', sans-serif; }
    .auth-tab.active { background: linear-gradient(135deg, var(--grad-1), var(--grad-2)); color: white; }
    .role-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 18px; }
    .role-btn { padding: 10px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg-input); cursor: pointer; font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 500; color: var(--text-secondary); transition: all 0.2s; display: flex; align-items: center; gap: 8px; }
    .role-btn.selected { border-color: var(--primary); background: rgba(14,165,233,0.1); color: var(--primary); }
    .demo-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); }
    .demo-chip { padding: 6px 12px; border-radius: 8px; background: var(--bg-input); border: 1px solid var(--border); font-size: 12px; cursor: pointer; transition: all 0.2s; color: var(--text-secondary); }
    .demo-chip:hover { border-color: var(--primary); color: var(--primary); }
    .top-bar { position: fixed; top: 20px; right: 20px; z-index: 10; }
    .features-strip { display: flex; gap: 20px; justify-content: center; margin-top: 24px; flex-wrap: wrap; }
    .feature-chip { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-muted); }
  </style>
</head>
<body>
  <div class="top-bar">
    <button class="theme-toggle" id="themeToggle" title="Toggle Theme"></button>
  </div>
  <div class="auth-page">
    <div class="auth-container">
      <div class="auth-logo">
        <div class="logo-icon">🏥</div>
        <h1>MediCore HMS</h1>
        <p>Hospital Management System</p>
      </div>
      <div class="glass-card">
        <div class="auth-tabs">
          <button class="auth-tab active" onclick="switchTab('login')">Sign In</button>
          <button class="auth-tab" onclick="switchTab('signup')">Register</button>
        </div>
        <div id="loginForm">
          <h2>Welcome Back</h2>
          <p class="subtitle">Sign in to your account to continue</p>
          <div class="form-group">
            <label>Email Address</label>
            <div class="input-icon-wrap"><span class="input-icon">📧</span>
              <input type="email" class="form-control" id="loginEmail" placeholder="you@hospital.com" required>
            </div>
          </div>
          <div class="form-group">
            <label>Password</label>
            <div class="input-icon-wrap"><span class="input-icon">🔒</span>
              <input type="password" class="form-control" id="loginPassword" placeholder="Enter your password" required>
            </div>
          </div>
          <div style="display:flex;justify-content:flex-end;margin-bottom:20px">
            <a href="#" style="font-size:13px;color:var(--primary)">Forgot password?</a>
          </div>
          <button class="btn btn-primary btn-full btn-lg" id="loginBtn" onclick="handleLogin()">Sign In →</button>
          <div class="demo-bar">
            <span style="font-size:12px;color:var(--text-muted);width:100%">🎮 Demo Accounts:</span>
            <div class="demo-chip" onclick="fillDemo('admin@medicore.com','admin123')">👑 Admin</div>
            <div class="demo-chip" onclick="fillDemo('doctor@medicore.com','doctor123')">👨‍⚕️ Doctor</div>
            <div class="demo-chip" onclick="fillDemo('reception@medicore.com','reception123')">🏥 Reception</div>
            <div class="demo-chip" onclick="fillDemo('patient@medicore.com','patient123')">🧑 Patient</div>
          </div>
        </div>
        <div id="signupForm" style="display:none">
          <h2>Create Account</h2>
          <p class="subtitle">Register as a new staff member or patient</p>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px">
            <div class="form-group" style="margin:0"><label>First Name</label>
              <input type="text" class="form-control" id="signupFirst" placeholder="John" required>
            </div>
            <div class="form-group" style="margin:0"><label>Last Name</label>
              <input type="text" class="form-control" id="signupLast" placeholder="Doe" required>
            </div>
          </div>
          <div class="form-group">
            <label>Email Address</label>
            <div class="input-icon-wrap"><span class="input-icon">📧</span>
              <input type="email" class="form-control" id="signupEmail" placeholder="you@hospital.com" required>
            </div>
          </div>
          <div class="form-group">
            <label>Password</label>
            <div class="input-icon-wrap"><span class="input-icon">🔒</span>
              <input type="password" class="form-control" id="signupPassword" placeholder="Min. 8 characters" required>
            </div>
          </div>
          <div class="form-group">
            <label>Register As</label>
            <div class="role-grid">
              <button class="role-btn selected" onclick="selectRole(this,'admin')">👑 Admin</button>
              <button class="role-btn" onclick="selectRole(this,'doctor')">👨‍⚕️ Doctor</button>
              <button class="role-btn" onclick="selectRole(this,'receptionist')">🏥 Receptionist</button>
              <button class="role-btn" onclick="selectRole(this,'patient')">🧑 Patient</button>
            </div>
            <input type="hidden" id="selectedRole" value="admin">
          </div>
          <button class="btn btn-primary btn-full btn-lg" id="signupBtn" onclick="handleSignup()">Create Account →</button>
        </div>
      </div>
      <div class="features-strip">
        <div class="feature-chip"><span>🔒</span> Secure Auth</div>
        <div class="feature-chip"><span>⚡</span> Real-time</div>
        <div class="feature-chip"><span>📱</span> Responsive</div>
        <div class="feature-chip"><span>☁️</span> Cloud-based</div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/utils.js"></script>
  <script>
    initTheme();
    document.getElementById('themeToggle').addEventListener('click', toggleTheme);
    (async () => { const s = await getSession(); if (s) window.location.href = 'pages/dashboard.html'; })();
    function switchTab(tab) {
      document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active', (tab==='login'&&i===0)||(tab==='signup'&&i===1)));
      document.getElementById('loginForm').style.display = tab==='login'?'block':'none';
      document.getElementById('signupForm').style.display = tab==='signup'?'block':'none';
    }
    function selectRole(btn, role) {
      document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      document.getElementById('selectedRole').value = role;
    }
    function fillDemo(email, pass) {
      document.getElementById('loginEmail').value = email;
      document.getElementById('loginPassword').value = pass;
      toast('Demo credentials filled!', 'info');
    }
    async function handleLogin() {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      if (!email || !password) { toast('Please fill in all fields', 'warning'); return; }
      document.getElementById('loginBtn').textContent = 'Signing in...';
      try {
        await signIn(email, password);
        toast('Welcome back!', 'success');
        setTimeout(() => window.location.href = 'pages/dashboard.html', 800);
      } catch (err) {
        toast(err.message || 'Login failed', 'error');
        document.getElementById('loginBtn').textContent = 'Sign In →';
      }
    }
    async function handleSignup() {
      const first = document.getElementById('signupFirst').value.trim();
      const last = document.getElementById('signupLast').value.trim();
      const email = document.getElementById('signupEmail').value.trim();
      const password = document.getElementById('signupPassword').value;
      const role = document.getElementById('selectedRole').value;
      if (!first||!last||!email||!password) { toast('Please fill in all fields','warning'); return; }
      document.getElementById('signupBtn').textContent = 'Creating...';
      try {
        const { data } = await signUp(email, password, { full_name: first+' '+last, role });
        if (data.user) {
          await db.from('users').upsert({ id: data.user.id, email, full_name: first+' '+last, role });
          toast('Account created! Check your email.', 'success');
          switchTab('login');
        }
      } catch (err) { toast(err.message || 'Signup failed', 'error'); }
      document.getElementById('signupBtn').textContent = 'Create Account →';
    }
    document.addEventListener('keydown', e => { if (e.key==='Enter') { if (!document.getElementById('loginForm').style.display || document.getElementById('loginForm').style.display!=='none') handleLogin(); else handleSignup(); }});
  </script>
</body>
</html>
