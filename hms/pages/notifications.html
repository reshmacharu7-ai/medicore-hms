<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notifications — MediCore HMS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/main.css">
</head>
<body>
<div id="sidebar"></div>
<div class="main-content">
  <div id="topbar"></div>
  <div class="page-content">
    <div class="page-header">
      <div>
        <h1 class="page-title">Notifications</h1>
        <p class="page-subtitle">Stay updated with alerts, reminders and system events</p>
      </div>
      <div style="display:flex;gap:12px">
        <button class="btn-secondary" onclick="markAllRead()">✅ Mark All Read</button>
        <button class="btn-secondary" onclick="clearAll()" style="color:var(--error)">🗑️ Clear All</button>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-grid" style="grid-template-columns:repeat(4,1fr)">
      <div class="stat-card"><div class="stat-icon" style="background:linear-gradient(135deg,#6c63ff,#a78bfa)">🔔</div><div class="stat-info"><span class="stat-value" id="totalNotifs">0</span><span class="stat-label">Total</span></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:linear-gradient(135deg,#ff6b7a,#ff9a9e)">🚨</div><div class="stat-info"><span class="stat-value" id="unreadNotifs">0</span><span class="stat-label">Unread</span></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:linear-gradient(135deg,#f59e0b,#fbbf24)">⚠️</div><div class="stat-info"><span class="stat-value" id="emergencyNotifs">0</span><span class="stat-label">Emergencies</span></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:linear-gradient(135deg,#00d4aa,#0099cc)">📅</div><div class="stat-info"><span class="stat-value" id="reminderNotifs">0</span><span class="stat-label">Reminders</span></div></div>
    </div>

    <!-- Filter tabs -->
    <div class="glass-card" style="padding:8px 16px;margin-bottom:20px;display:flex;gap:8px;flex-wrap:wrap">
      <button class="notif-tab active" onclick="filterByType('all', this)">All</button>
      <button class="notif-tab" onclick="filterByType('emergency', this)">🚨 Emergency</button>
      <button class="notif-tab" onclick="filterByType('appointment', this)">📅 Appointments</button>
      <button class="notif-tab" onclick="filterByType('bed', this)">🛏️ Bed Alerts</button>
      <button class="notif-tab" onclick="filterByType('billing', this)">💰 Billing</button>
      <button class="notif-tab" onclick="filterByType('system', this)">⚙️ System</button>
      <button class="notif-tab" onclick="filterByType('unread', this)">🔵 Unread</button>
    </div>

    <!-- Notifications List -->
    <div id="notifList"></div>
  </div>
</div>

<style>
.notif-tab{padding:8px 16px;border-radius:20px;border:1px solid var(--glass-border);background:transparent;color:var(--text-secondary);font-size:13px;cursor:pointer;transition:.3s;white-space:nowrap}
.notif-tab.active,.notif-tab:hover{background:var(--accent-grad);color:#fff;border-color:transparent}
.notif-item{background:var(--glass-bg);backdrop-filter:blur(20px);border:1px solid var(--glass-border);border-radius:14px;padding:18px 20px;margin-bottom:10px;display:flex;gap:16px;align-items:flex-start;transition:.3s;position:relative;overflow:hidden}
.notif-item.unread{border-left:3px solid var(--accent-1)}
.notif-item.unread::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(90deg,rgba(0,212,170,.03),transparent);pointer-events:none}
.notif-item:hover{transform:translateX(4px)}
.notif-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.notif-content{flex:1;min-width:0}
.notif-title{font-weight:600;font-size:14px;color:var(--text-primary);margin-bottom:4px}
.notif-body{font-size:13px;color:var(--text-secondary);line-height:1.5}
.notif-time{font-size:12px;color:var(--text-secondary);margin-top:6px}
.notif-actions{display:flex;gap:8px;align-items:center;flex-shrink:0}
.unread-dot{width:8px;height:8px;border-radius:50%;background:var(--accent-1);flex-shrink:0;margin-top:6px}
.notif-empty{text-align:center;padding:80px 20px;color:var(--text-secondary)}
</style>

<script src="../js/supabase-config.js"></script>
<script src="../js/app.js"></script>
<script>
AppState.currentPage = 'notifications';
let allNotifications = [], currentFilter = 'all';

const notifTypes = {
  emergency: { icon:'🚨', bg:'linear-gradient(135deg,#ff6b7a,#ff9a9e)' },
  appointment: { icon:'📅', bg:'linear-gradient(135deg,#00d4aa,#0099cc)' },
  bed: { icon:'🛏️', bg:'linear-gradient(135deg,#f59e0b,#fbbf24)' },
  billing: { icon:'💰', bg:'linear-gradient(135deg,#22c55e,#16a34a)' },
  system: { icon:'⚙️', bg:'linear-gradient(135deg,#6c63ff,#a78bfa)' }
};

const mockNotifications = [
  { id:'n1', type:'emergency', title:'🚨 Emergency Alert: ICU Bed Critical', body:'Patient Priya Sharma in ICU Bed 3 requires immediate attention. Oxygen saturation dropping.', time:'2 min ago', read:false },
  { id:'n2', type:'appointment', title:'📅 Appointment Reminder', body:'Dr. Suresh Kumar has an appointment with Aarav Patel at 10:30 AM today.', time:'15 min ago', read:false },
  { id:'n3', type:'bed', title:'🛏️ Bed Available: General Ward B', body:'Bed GB-12 has been cleaned and is now available for new admission.', time:'32 min ago', read:false },
  { id:'n4', type:'billing', title:'💰 Payment Received', body:'₹15,000 payment received from Karthik Raj for Bill #B1023.', time:'1 hr ago', read:true },
  { id:'n5', type:'appointment', title:'📅 Appointment Cancelled', body:'Deepika Menon cancelled her 2:00 PM appointment with Dr. Ananya Krishnan.', time:'2 hrs ago', read:true },
  { id:'n6', type:'emergency', title:'🚨 New Emergency Admission', body:'High priority patient admitted to Emergency Bay 2 — multiple trauma injuries.', time:'3 hrs ago', read:true },
  { id:'n7', type:'system', title:'⚙️ System Backup Complete', body:'Daily database backup completed successfully. All records are secure.', time:'4 hrs ago', read:true },
  { id:'n8', type:'billing', title:'💰 Pending Bill Reminder', body:'5 bills are pending payment for more than 7 days. Review required.', time:'5 hrs ago', read:true },
  { id:'n9', type:'bed', title:'🛏️ ICU Capacity Alert', body:'ICU is at 90% capacity (9/10 beds occupied). Consider readiness measures.', time:'6 hrs ago', read:true },
  { id:'n10', type:'appointment', title:'📅 New Appointment Booked', body:'Vikram Singh booked an appointment with Dr. Suresh Kumar for tomorrow at 11:00 AM.', time:'Yesterday', read:true },
  { id:'n11', type:'system', title:'⚙️ New Doctor Registered', body:'Dr. Lakshmi Iyer has been added to the system under Cardiology department.', time:'Yesterday', read:true },
  { id:'n12', type:'emergency', title:'🚨 Code Blue Resolved', body:'Code Blue in Room 204 has been resolved. Patient is stable.', time:'2 days ago', read:true }
];

async function init() {
  await Layout.init();
  allNotifications = [...mockNotifications];
  // Try to fetch real notifications from DB
  try {
    const dbNotifs = await DB.fetch('notifications', { order: 'created_at' });
    if (dbNotifs.length > 0) allNotifications = dbNotifs;
  } catch(e) {}
  updateStats();
  renderNotifications();
}

function updateStats() {
  document.getElementById('totalNotifs').textContent = allNotifications.length;
  document.getElementById('unreadNotifs').textContent = allNotifications.filter(n => !n.read).length;
  document.getElementById('emergencyNotifs').textContent = allNotifications.filter(n => n.type === 'emergency').length;
  document.getElementById('reminderNotifs').textContent = allNotifications.filter(n => n.type === 'appointment').length;
}

function filterByType(type, btn) {
  currentFilter = type;
  document.querySelectorAll('.notif-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderNotifications();
}

function renderNotifications() {
  let filtered = allNotifications;
  if (currentFilter === 'unread') filtered = allNotifications.filter(n => !n.read);
  else if (currentFilter !== 'all') filtered = allNotifications.filter(n => n.type === currentFilter);

  const list = document.getElementById('notifList');
  if (filtered.length === 0) {
    list.innerHTML = '<div class="notif-empty"><div style="font-size:48px;margin-bottom:12px">🔔</div><p>No notifications here</p></div>';
    return;
  }
  list.innerHTML = filtered.map(n => notifItem(n)).join('');
}

function notifItem(n) {
  const cfg = notifTypes[n.type] || notifTypes.system;
  return `<div class="notif-item ${n.read ? '' : 'unread'}" id="notif-${n.id}">
    ${!n.read ? '<div class="unread-dot"></div>' : '<div style="width:8px"></div>'}
    <div class="notif-icon" style="background:${cfg.bg}">${cfg.icon}</div>
    <div class="notif-content">
      <div class="notif-title">${n.title}</div>
      <div class="notif-body">${n.body}</div>
      <div class="notif-time">🕐 ${n.time}</div>
    </div>
    <div class="notif-actions">
      ${!n.read ? `<button class="btn-icon" title="Mark read" onclick="markRead('${n.id}')">✅</button>` : ''}
      <button class="btn-icon btn-delete" title="Delete" onclick="deleteNotif('${n.id}')">🗑️</button>
    </div>
  </div>`;
}

function markRead(id) {
  const n = allNotifications.find(x => x.id === id);
  if (n) { n.read = true; }
  updateStats();
  renderNotifications();
}

function markAllRead() {
  allNotifications.forEach(n => n.read = true);
  updateStats();
  renderNotifications();
  Toast.success('All notifications marked as read');
}

function deleteNotif(id) {
  allNotifications = allNotifications.filter(n => n.id !== id);
  updateStats();
  renderNotifications();
  Toast.info('Notification removed');
}

function clearAll() {
  if (!confirm('Clear all notifications?')) return;
  allNotifications = [];
  updateStats();
  renderNotifications();
  Toast.success('All notifications cleared');
}

init();
</script>
</body>
</html>
