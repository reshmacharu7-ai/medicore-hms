<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MediCore HMS — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg-gradient:linear-gradient(135deg,#0a0e1a 0%,#0d1f2d 40%,#0a1628 100%);
  --glass-bg:rgba(255,255,255,0.05);
  --glass-border:rgba(255,255,255,0.1);
  --text-primary:#f0f4ff;
  --text-secondary:#8899bb;
  --accent-1:#00d4aa;
  --accent-2:#0099cc;
  --accent-grad:linear-gradient(135deg,#00d4aa,#0099cc);
  --input-bg:rgba(255,255,255,0.06);
  --input-border:rgba(255,255,255,0.12);
  --error:#ff6b7a;
}
[data-theme="light"]{
  --bg-gradient:linear-gradient(135deg,#e8f4fd 0%,#dbeffe 40%,#e4f5f0 100%);
  --glass-bg:rgba(255,255,255,0.85);
  --glass-border:rgba(0,153,204,0.2);
  --text-primary:#1a2744;
  --text-secondary:#5566aa;
  --input-bg:rgba(255,255,255,0.9);
  --input-border:rgba(0,153,204,0.3);
}
body{
  font-family:'DM Sans',sans-serif;
  min-height:100vh;
  background:var(--bg-gradient);
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
.bg-orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.3;pointer-events:none}
.orb1{width:500px;height:500px;background:radial-gradient(#00d4aa,transparent);top:-150px;right:-100px}
.orb2{width:400px;height:400px;background:radial-gradient(#0099cc,transparent);bottom:-100px;left:-100px}
.orb3{width:300px;height:300px;background:radial-gradient(#6c63ff,transparent);top:50%;left:40%;transform:translate(-50%,-50%)}
.theme-toggle{
  position:fixed;top:20px;right:20px;
  background:var(--glass-bg);border:1px solid var(--glass-border);
  color:var(--text-primary);padding:8px 16px;border-radius:50px;
  cursor:pointer;font-size:14px;backdrop-filter:blur(10px);
  transition:.3s;z-index:100;
}
.theme-toggle:hover{background:var(--accent-grad);color:#fff;border-color:transparent}
.auth-container{
  width:100%;max-width:460px;padding:20px;z-index:10;
  animation:fadeUp .6s ease;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.logo-area{text-align:center;margin-bottom:32px}
.logo-icon{
  width:72px;height:72px;border-radius:20px;
  background:var(--accent-grad);
  display:inline-flex;align-items:center;justify-content:center;
  font-size:32px;margin-bottom:16px;
  box-shadow:0 8px 32px rgba(0,212,170,.3);
}
.logo-area h1{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--text-primary)}
.logo-area p{color:var(--text-secondary);font-size:14px;margin-top:4px}
.card{
  background:var(--glass-bg);
  backdrop-filter:blur(20px);
  border:1px solid var(--glass-border);
  border-radius:24px;padding:36px;
  box-shadow:0 20px 60px rgba(0,0,0,.3);
}
.tabs{display:flex;background:rgba(0,0,0,.2);border-radius:12px;padding:4px;margin-bottom:28px;gap:4px}
[data-theme="light"] .tabs{background:rgba(0,153,204,.08)}
.tab{flex:1;padding:10px;text-align:center;border-radius:9px;cursor:pointer;font-size:14px;font-weight:500;
  color:var(--text-secondary);transition:.3s;border:none;background:transparent;}
.tab.active{background:var(--accent-grad);color:#fff;box-shadow:0 4px 12px rgba(0,212,170,.3)}
.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:13px;font-weight:500;color:var(--text-secondary);margin-bottom:8px}
.form-group input,.form-group select{
  width:100%;padding:12px 16px;border-radius:12px;
  background:var(--input-bg);border:1px solid var(--input-border);
  color:var(--text-primary);font-size:14px;font-family:'DM Sans',sans-serif;
  transition:.3s;outline:none;
}
.form-group input:focus,.form-group select:focus{border-color:var(--accent-1);box-shadow:0 0 0 3px rgba(0,212,170,.15)}
.form-group select option{background:#1a2744;color:#f0f4ff}
.input-icon{position:relative}
.input-icon input{padding-left:44px}
.input-icon span{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:16px;opacity:.5}
.btn-primary{
  width:100%;padding:14px;border-radius:12px;border:none;
  background:var(--accent-grad);color:#fff;font-size:15px;font-weight:600;
  cursor:pointer;transition:.3s;font-family:'DM Sans',sans-serif;
  box-shadow:0 4px 20px rgba(0,212,170,.3);
}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,212,170,.4)}
.btn-primary:active{transform:translateY(0)}
.btn-primary:disabled{opacity:.6;cursor:not-allowed;transform:none}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--text-secondary);font-size:13px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--glass-border)}
.demo-roles{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
.role-btn{
  padding:10px;border-radius:10px;border:1px solid var(--glass-border);
  background:var(--glass-bg);color:var(--text-primary);font-size:13px;
  cursor:pointer;transition:.3s;text-align:center;
}
.role-btn:hover{border-color:var(--accent-1);background:rgba(0,212,170,.1);color:var(--accent-1)}
.role-btn .role-icon{font-size:20px;display:block;margin-bottom:4px}
.error-msg{color:var(--error);font-size:13px;margin-top:8px;display:none}
.error-msg.show{display:block}
.loading-spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);
  border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.forgot-link{text-align:right;margin-top:-10px;margin-bottom:16px}
.forgot-link a{color:var(--accent-1);font-size:13px;text-decoration:none;cursor:pointer}
.forgot-link a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>
<div class="bg-orb orb3"></div>
<button class="theme-toggle" onclick="toggleTheme()">🌙 Dark</button>

<div class="auth-container">
  <div class="logo-area">
    <div class="logo-icon">🏥</div>
    <h1>MediCore HMS</h1>
    <p>Hospital Management System</p>
  </div>
  <div class="card">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Sign In</button>
      <button class="tab" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <!-- Login Form -->
    <div id="loginForm">
      <div class="form-group">
        <label>Email Address</label>
        <div class="input-icon">
          <span>📧</span>
          <input type="email" id="loginEmail" placeholder="doctor@medicore.com" autocomplete="email">
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-icon">
          <span>🔒</span>
          <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
        </div>
      </div>
      <div class="forgot-link"><a onclick="showForgot()">Forgot password?</a></div>
      <div class="error-msg" id="loginError"></div>
      <button class="btn-primary" onclick="handleLogin()" id="loginBtn">Sign In</button>

      <div class="divider">or demo login as</div>
      <div class="demo-roles">
        <button class="role-btn" onclick="demoLogin('admin')"><span class="role-icon">👨‍💼</span>Admin</button>
        <button class="role-btn" onclick="demoLogin('doctor')"><span class="role-icon">👨‍⚕️</span>Doctor</button>
        <button class="role-btn" onclick="demoLogin('receptionist')"><span class="role-icon">👩‍💻</span>Receptionist</button>
        <button class="role-btn" onclick="demoLogin('patient')"><span class="role-icon">🧑‍🦯</span>Patient</button>
      </div>
    </div>

    <!-- Signup Form -->
    <div id="signupForm" style="display:none">
      <div class="form-group">
        <label>Full Name</label>
        <div class="input-icon">
          <span>👤</span>
          <input type="text" id="signupName" placeholder="Dr. John Smith">
        </div>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <div class="input-icon">
          <span>📧</span>
          <input type="email" id="signupEmail" placeholder="you@medicore.com">
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-icon">
          <span>🔒</span>
          <input type="password" id="signupPassword" placeholder="Min. 8 characters">
        </div>
      </div>
      <div class="form-group">
        <label>Role</label>
        <select id="signupRole">
          <option value="receptionist">Receptionist</option>
          <option value="doctor">Doctor</option>
          <option value="patient">Patient</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <div class="error-msg" id="signupError"></div>
      <button class="btn-primary" onclick="handleSignup()" id="signupBtn">Create Account</button>
    </div>
  </div>
</div>

<script src="js/supabase-config.js"></script>
<script src="js/app.js"></script>
<script>
let currentTab = 'login';

// Check if already logged in
window.addEventListener('DOMContentLoaded', async () => {
  const session = await Auth.getSession();
  if (session) window.location.href = 'index.html';
  const theme = localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', theme);
  document.querySelector('.theme-toggle').textContent = theme === 'dark' ? '🌙 Dark' : '☀️ Light';
});

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  document.querySelector('.theme-toggle').textContent = next === 'dark' ? '🌙 Dark' : '☀️ Light';
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='signup')));
  document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('signupForm').style.display = tab === 'signup' ? 'block' : 'none';
}

function showError(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 4000);
}

function setLoading(btnId, loading) {
  const btn = document.getElementById(btnId);
  btn.disabled = loading;
  btn.innerHTML = loading ? '<span class="loading-spinner"></span>Please wait...' : (btnId === 'loginBtn' ? 'Sign In' : 'Create Account');
}

async function handleLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPassword').value;
  if (!email || !pass) { showError('loginError', 'Please fill in all fields'); return; }
  setLoading('loginBtn', true);
  const { error } = await Auth.login(email, pass);
  setLoading('loginBtn', false);
  if (error) { showError('loginError', error.message || 'Login failed'); return; }
  window.location.href = 'index.html';
}

async function handleSignup() {
  const name = document.getElementById('signupName').value.trim();
  const email = document.getElementById('signupEmail').value.trim();
  const pass = document.getElementById('signupPassword').value;
  const role = document.getElementById('signupRole').value;
  if (!name || !email || !pass) { showError('signupError', 'Please fill in all fields'); return; }
  if (pass.length < 8) { showError('signupError', 'Password must be at least 8 characters'); return; }
  setLoading('signupBtn', true);
  const { error } = await Auth.signup(email, pass, { full_name: name, role });
  setLoading('signupBtn', false);
  if (error) { showError('signupError', error.message || 'Signup failed'); return; }
  switchTab('login');
  document.getElementById('loginEmail').value = email;
  Toast.success('Account created! Please sign in.');
}

async function demoLogin(role) {
  // Demo: store role and go to dashboard
  AppState.user = { id: 'demo-' + role, email: role + '@demo.medicore.com', role };
  AppState.role = role;
  localStorage.setItem('demoUser', JSON.stringify(AppState.user));
  window.location.href = 'index.html';
}

function showForgot() {
  const email = document.getElementById('loginEmail').value.trim();
  if (!email) { showError('loginError', 'Enter your email first, then click Forgot Password'); return; }
  Toast.info('Password reset email sent (demo mode — check console)');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (currentTab === 'login') handleLogin();
    else handleSignup();
  }
});
</script>
</body>
</html>
